    <!DOCTYPE html>
    <html>
    <head>
        <title>Products</title>
    </head>
    <body>

    <h1>All Products</h1>

    {% if products %}
    {% for product in products %}
        <div>
            <a href="{% url 'product_detail' product.id %}">
                <img src="{{ product.image.url }}" width="200" height="200" alt="{{ product.name }}">
            </a>
            <h2>{{ product.name }}</h2>
        </div>
    {% endfor %}
    {% else %}
        <p>No products available.</p>
    {% endif %}

    </body>
    </html>
